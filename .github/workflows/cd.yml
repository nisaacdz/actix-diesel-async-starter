name: Continuous Deployment

on:
  # 1. Listen for the completion of the CI workflow
  workflow_run:
    workflows: ["CI"] # This MUST exactly match the 'name:' defined at the top of your ci.yml
    types:
      - completed
    branches:
      - main
      
  # 2. Allow manual triggers to deploy to specific environments (like Production)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

env:
  IMAGE_NAME: transitgh-api

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'development' }}
    runs-on: ubuntu-latest
    
    # 3. CRUCIAL: Only proceed if the CI run was successful OR if triggered manually
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    # 4. Bind this job to a specific GitHub Environment to load the correct variables
    environment: ${{ inputs.environment || 'development' }}
    
    # 5. Required permissions for keyless Workload Identity Federation (OIDC)
    permissions:
      contents: 'read'
      id-token: 'write'

